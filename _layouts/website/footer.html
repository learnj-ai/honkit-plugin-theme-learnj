{% set themeConfig = config.pluginsConfig['theme-learnj'] or {} %}

<footer class="learnj-footer border-t border-border bg-background" role="contentinfo">
    <div class="mx-auto flex max-w-4xl flex-col gap-4 px-4 py-8 sm:flex-row sm:items-center sm:justify-between lg:px-8">
        <div class="min-w-0 space-y-1">
            <p class="text-sm font-semibold text-foreground">
                {{ themeConfig.logoText or config.title }}
            </p>
            {% if config.description %}
            <p class="text-sm text-muted-foreground">{{ config.description }}</p>
            {% endif %}
        </div>

        <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-muted-foreground">
            {% if themeConfig.githubUrl %}
            <a href="{{ themeConfig.githubUrl }}" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-2 font-medium text-foreground transition-colors hover:text-primary">
                {% include "website/github-icon.html" %}
                <span>GitHub</span>
            </a>
            {% endif %}
            <span class="hidden h-4 w-px bg-border sm:inline-block" aria-hidden="true"></span>
            <span>{{ "GITBOOK_LINK"|t }}</span>
        </div>
    </div>
</footer>
