<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LearnJ overview · Slides</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/dracula.css" id="theme">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/base16/dracula.min.css">
    <link rel="stylesheet" href="../gitbook/learnj.css">
    <style>
        html, body { height: 100%; margin: 0; }
        .learnj-slideshow-toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: 0.5rem 1rem;
            border-bottom: 1px solid hsl(var(--border));
            background: hsl(var(--background) / 0.92);
            backdrop-filter: blur(8px);
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        }
        .learnj-slideshow-toolbar a {
            font-size: 0.875rem; font-weight: 500; text-decoration: none;
            color: hsl(var(--foreground));
        }
        .learnj-slideshow-toolbar a:hover { opacity: 0.8; }
        .learnj-slideshow-hint { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }
        .reveal { top: 2.75rem !important; height: calc(100% - 2.75rem) !important; }
        .reveal .slides { text-align: left; }
        .reveal .slides section { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
        .reveal h1, .reveal h2, .reveal h3 { font-family: Inter, ui-sans-serif, system-ui, sans-serif; text-transform: none; }
        .reveal pre code { font-family: "JetBrains Mono", ui-monospace, monospace; }
        .reveal .title-slide { text-align: center; }
    </style>
</head>
<body>
    <div class="learnj-slideshow-toolbar">
        <a href="../index.html">← Back to docs</a>
        <span class="learnj-slideshow-hint">← → navigate · S speaker · F fullscreen · ? help</span>
    </div>

    <div class="reveal">
        <div class="slides">
            <section
                data-markdown="overview.md"
                data-separator="^\n---\n$"
                data-separator-vertical="^\n--\n$"
                data-separator-notes="^Note:"
            ></section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            slideNumber: "c/t",
            width: 1280,
            height: 720,
            margin: 0.08,
            transition: "slide",
            backgroundTransition: "fade",
            plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
            markdown: {
                smartypants: true
            }
        });
    </script>
</body>
</html>
