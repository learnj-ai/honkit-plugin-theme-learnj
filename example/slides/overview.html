<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LearnJ overview · Slides</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../gitbook/learnj.css">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .learnj-slideshow-toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: 0.5rem 1rem;
            border-bottom: 1px solid hsl(var(--border));
            background: hsl(var(--background) / 0.92);
            backdrop-filter: blur(8px);
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        }
        .learnj-slideshow-toolbar a {
            font-size: 0.875rem; font-weight: 500; text-decoration: none;
            color: hsl(var(--foreground));
        }
        .learnj-slideshow-toolbar a:hover { opacity: 0.8; }
        .learnj-slideshow-hint { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }
        .remark-visible { top: 2.75rem !important; }
        .remark-slide-content {
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            font-size: 28px;
        }
        .remark-slide-content h1 { font-size: 2.25em; font-weight: 700; }
        .remark-slide-content h2 { font-size: 1.35em; font-weight: 600; color: hsl(240 3.8% 46.1%); }
        .remark-code, .remark-slide-content code {
            font-family: "JetBrains Mono", ui-monospace, monospace;
        }
    </style>
    <script>
        (function () {
            try {
                var stored = localStorage.getItem("learnj-theme");
                var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                if (stored === "dark" || (!stored && prefersDark)) {
                    document.documentElement.classList.add("dark");
                }
            } catch (e) {}
        })();
    </script>
</head>
<body class="font-sans antialiased">
    <div class="learnj-slideshow-toolbar">
        <a href="../index.html">← Back to docs</a>
        <span class="learnj-slideshow-hint">← → navigate · P presenter · C clone · H help</span>
    </div>
    <script src="https://remarkjs.com/downloads/remark-latest.min.js"></script>
    <script>
        remark.create({
            sourceUrl: "overview.md",
            highlightStyle: "github",
            highlightLanguage: "remark",
            ratio: "16:9",
            slideNumberFormat: "%current% / %total%"
        });
    </script>
</body>
</html>
